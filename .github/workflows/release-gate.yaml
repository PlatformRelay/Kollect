# Read-only pre-tag gate. It never creates tags or publishes artifacts.
name: Release gate

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Full commit SHA (empty = current protected main HEAD)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  checks: read
  pull-requests: read

jobs:
  gate:
    name: release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Resolve protected-main commit
        id: commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_SHA}" ]]; then
            [[ "${INPUT_SHA}" =~ ^[0-9a-f]{40}$ ]] || {
              echo "sha must be a full lowercase commit SHA" >&2
              exit 1
            }
            sha="${INPUT_SHA}"
          else
            sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq .sha)"
          fi
          gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}" --silent
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ steps.commit.outputs.sha }}
          fetch-depth: 1
          persist-credentials: false
      - uses: ./.github/actions/go-cache
        with:
          envtest: "true"
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          version: 3.51.1
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.17.3
      - name: Re-run local release gates
        env:
          CI: "true"
        run: |
          task verify
          task test
          task helm-test
          task changelog:verify
      - name: Prove reviewed-main and hosted check evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash hack/ci/test-verify-release-eligibility.sh
          bash hack/ci/verify-release-eligibility.sh "${{ steps.commit.outputs.sha }}"
      - name: Record immutable result
        env:
          RELEASE_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          {
            echo "## Release gate passed"
            echo
            echo "Reviewed protected-main commit \`${RELEASE_SHA}\` has all required exact-SHA checks."
            echo "This workflow did not tag or publish anything."
          } >> "${GITHUB_STEP_SUMMARY}"
