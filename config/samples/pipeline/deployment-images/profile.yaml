# Image versions — collect the container image(s) running in every Deployment.
apiVersion: kollect.dev/v1alpha1
kind: KollectProfile
metadata:
  name: deployment-images
  namespace: kollect-system
spec:
  targetGVK:
    group: apps
    version: v1
    kind: Deployment
  attributes:
    - name: image
      path: "$.spec.template.spec.containers[0].image"
      type: string
    - name: images
      path: "$.spec.template.spec.containers[*].image"
      type: list
    - name: containerCount
      path: "cel:size(object.spec.template.spec.containers)"
      type: int
    - name: replicas
      path: "$.spec.replicas"
      type: int
      optional: true
