apiVersion: kollect.dev/v1alpha1
kind: KollectSnapshotSink
metadata:
  name: git-inventory-demo
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/managed-by: kustomize
spec:
  type: git
  endpoint: https://github.com/konih/kollect-inventory-demo.git
  # Fleet: partition paths per cluster to reduce repo lock contention (ADR-0407, ADR-0501).
  pathTemplate: clusters/{cluster}/inventory/{namespace}/{name}.json
  cluster: lab-west
  connectionTest: true
  git:
    branch: main
    pushPolicy: Commit
    # commitMessage optional — default includes cluster, namespace, name, item count, checksum
    auth:
      type: token
  # Uncomment when pushing to a private repo (Phase 1+):
  # secretRef:
  #   name: git-push-credentials
  #   namespace: kollect-system
  # tls:
  #   caSecretRef:
  #     name: git-custom-ca
  #     namespace: kollect-system
