apiVersion: kollect.dev/v1alpha1
kind: KollectDatabaseSink
metadata:
  name: postgres-inventory-demo
  namespace: default
  labels:
    app.kubernetes.io/name: kollect
    app.kubernetes.io/managed-by: kustomize
spec:
  type: postgres
  cluster: kind-kollect-dev
  connectionTest: true
  # Cross-cutting provisioning ownership (ADR-0416). ensure (the default) creates the
  # table on first export — required for the out-of-the-box quickstart path. Platform
  # teams that own their schema (e.g. created via Flyway/Liquibase) set mode: existing
  # so kollect never issues DDL — it only upserts rows and surfaces a missing-table
  # error loudly via preflight.
  provisioning:
    mode: ensure         # existing never touches DDL (bring your own schema)
  # Non-secret pass-through tuning (ADR-0416). Secret-like keys are rejected by the webhook;
  # credentials always travel via databaseRef/secretRef.
  options:
    statement_timeout: "30000"
  postgres:
    databaseRef:
      name: inventory-postgres-dsn
      namespace: kollect-system
    schema: public
    table: inventory_items
  # Secret example (create separately; never commit real credentials):
  # apiVersion: v1
  # kind: Secret
  # metadata:
  #   name: inventory-postgres-dsn
  #   namespace: kollect-system
  # stringData:
  #   dsn: postgres://kollect:example@postgres.kollect-system.svc:5432/inventory?sslmode=disable
