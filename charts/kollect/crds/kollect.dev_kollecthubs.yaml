---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: kollecthubs.kollect.dev
spec:
  group: kollect.dev
  names:
    kind: KollectHub
    listKind: KollectHubList
    plural: kollecthubs
    shortNames:
    - khub
    singular: kollecthub
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KollectHub declares a multi-cluster hub Deployment and transport
          queue.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KollectHubSpec defines the desired state of KollectHub.
            properties:
              remoteClusters:
                description: remoteClusters lists spoke registrations wired into this
                  hub consumer (ADR-0028).
                items:
                  description: RemoteClusterRef references a registered KollectRemoteCluster
                    on the hub (ADR-0028).
                  properties:
                    name:
                      description: name of the KollectRemoteCluster resource.
                      minLength: 1
                      type: string
                    namespace:
                      description: namespace of the KollectRemoteCluster; defaults
                        to kollect-system when empty.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              replicas:
                description: replicas is the hub consumer Deployment replica count.
                format: int32
                minimum: 1
                type: integer
              transport:
                description: transport configures the spoke-to-hub queue backend.
                properties:
                  redis:
                    description: redis configures a Redis Streams backend when type
                      is redis.
                    properties:
                      url:
                        description: url is a Redis connection URL (redis:// or rediss://).
                        type: string
                    required:
                    - url
                    type: object
                  type:
                    description: type selects the transport implementation.
                    enum:
                    - inprocess
                    - redis
                    - nats
                    - kafka
                    type: string
                required:
                - type
                type: object
            required:
            - transport
            type: object
          status:
