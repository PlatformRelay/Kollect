{{- if and .Values.rbac.create (not .Values.tenantMode) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kollect.fullname" . }}-manager
  labels:
    {{- include "kollect.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  - apiGroups: [kollect.dev]
    resources: [kollectconnectiontests, kollectinventories, kollectprofiles, kollectsinks, kollecttargets, kollectscopes]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [kollect.dev]
    resources: [kollectinventories/finalizers, kollecttargets/finalizers]
    verbs: [update]
  - apiGroups: [kollect.dev]
    resources: [kollectconnectiontests/status, kollectinventories/status, kollectsinks/status, kollecttargets/status]
    verbs: [get, patch, update]
{{- end }}
